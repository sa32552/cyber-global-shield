# =============================================================================
# Cyber Global Shield — Production Deployment
# =============================================================================
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d
#   docker-compose -f docker-compose.prod.yml logs -f
#   docker-compose -f docker-compose.prod.yml down
#
# Prerequisites:
#   - Docker & Docker Compose v2 installed
#   - Domain names pointing to your server
#   - .env file with production credentials
#   - SSL certificates (auto via Let's Encrypt)
# =============================================================================

version: "3.8"

services:
  # ─── Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.26-alpine
    container_name: cyber-shield-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/docker/nginx/ssl:/etc/letsencrypt:ro
      - ./infra/docker/nginx/html:/var/www:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    networks:
      - cyber-shield
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── SSL Certificate Manager ──────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: cyber-shield-certbot
    volumes:
      - ./infra/docker/nginx/ssl:/etc/letsencrypt
      - ./infra/docker/nginx/html:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    networks:
      - cyber-shield

  # ─── API (Multiple Instances for HA) ──────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.prod
    container_name: cyber-shield-api
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - WORKERS=8
      - RATE_LIMIT_PER_SECOND=10000
      - RATE_LIMIT_BURST=50000
    volumes:
      - api_data:/app/data
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cyber-shield
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "2"
          memory: "4G"
        reservations:
          cpus: "1"
          memory: "2G"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Ingestion Pipeline ───────────────────────────────────────────────
  vector:
    image: timberio/vector:0.38.0-alpine
    container_name: cyber-shield-vector
    command: --config /etc/vector/vector.yaml
    volumes:
      - ./vector.yaml:/etc/vector/vector.yaml:ro
    expose:
      - "9000"
    depends_on:
      - kafka
    restart: unless-stopped
    networks:
      - cyber-shield
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "1G"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Streaming ────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: cyber-shield-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - cyber-shield
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: cyber-shield-kafka
    expose:
      - "9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_COMPRESSION_TYPE: lz4
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_LOG_CLEANER_ENABLE: "true"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    depends_on:
      zookeeper:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cyber-shield
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "4G"
        reservations:
          cpus: "1"
          memory: "2G"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Analytics Database ───────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: cyber-shield-clickhouse
    expose:
      - "8123"
      - "9000"
    environment:
      CLICKHOUSE_DB: cyber_shield
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    restart: unless-stopped
    networks:
      - cyber-shield
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: "8G"
        reservations:
          cpus: "2"
          memory: "4G"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Cache ────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: cyber-shield-redis
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - cyber-shield
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "2G"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── ML / Ray ─────────────────────────────────────────────────────────
  ray-head:
    image: rayproject/ray:2.10.0-py310
    container_name: cyber-shield-ray-head
    command: ray start --head --port=6379 --dashboard-host=0.0.0.0 --num-cpus=8
    expose:
      - "6379"
      - "8265"
    volumes:
      - ray_data:/tmp/ray
    restart: unless-stopped
    networks:
      - cyber-shield
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: "8G"
        reservations:
          cpus: "2"
          memory: "4G"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ray-worker:
    image: rayproject/ray:2.10.0-py310
    container_name: cyber-shield-ray-worker
    command: ray start --address=ray-head:6379 --num-cpus=8
    depends_on:
      - ray-head
    volumes:
      - ray_data:/tmp/ray
    restart: unless-stopped
    networks:
      - cyber-shield
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "4"
          memory: "8G"
        reservations:
          cpus: "2"
          memory: "4G"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Federated Learning ───────────────────────────────────────────────
  fl-server:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.prod
    container_name: cyber-shield-fl-server
    command: python -m app.fl.federated_server
    expose:
      - "8080"
    env_file:
      - .env
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - cyber-shield
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "4G"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Observability ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: cyber-shield-grafana
    expose:
      - "3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-cybershield}
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel
      GF_SERVER_ROOT_URL: https://cyberglobalshield.io/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./infra/docker/grafana/datasources:/etc/grafana/provisioning/datasources
    restart: unless-stopped
    networks:
      - cyber-shield
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "1G"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: cyber-shield-prometheus
    expose:
      - "9090"
    volumes:
      - ./infra/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    restart: unless-stopped
    networks:
      - cyber-shield
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "4G"
        reservations:
          cpus: "1"
          memory: "2G"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Security Tools ───────────────────────────────────────────────────
  zeek:
    image: zeek/zeek:6.0
    container_name: cyber-shield-zeek
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_PTRACE
    volumes:
      - zeek_logs:/usr/local/zeek/logs
      - ./infra/docker/zeek/local.zeek:/usr/local/zeek/share/zeek/site/local.zeek:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "2G"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  suricata:
    image: jasonish/suricata:7.0
    container_name: cyber-shield-suricata
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - suricata_logs:/var/log/suricata
      - ./infra/docker/suricata/suricata.yaml:/etc/suricata/suricata.yaml:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "2G"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Log Watcher ──────────────────────────────────────────────────────
  log-watcher:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.prod
    container_name: cyber-shield-log-watcher
    command: python -m app.ingestion.log_watcher
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - CLICKHOUSE_HOST=clickhouse
      - ZEEK_LOG_DIR=/usr/local/zeek/logs/current
      - SURICATA_EVE_PATH=/var/log/suricata/eve.json
    volumes:
      - zeek_logs:/usr/local/zeek/logs:ro
      - suricata_logs:/var/log/suricata:ro
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cyber-shield
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "1G"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── MISP Threat Intel ────────────────────────────────────────────────
  misp:
    image: coolacid/misp-docker:core-latest
    container_name: cyber-shield-misp
    expose:
      - "443"
    environment:
      MISP_BASEURL: https://misp.cyberglobalshield.io
      MISP_ADMIN_EMAIL: admin@cyberglobalshield.io
      MISP_ADMIN_PASSPHRASE: ${MISP_PASSWORD:-CyberShield2024!}
    volumes:
      - misp_data:/var/www/MISP
    restart: unless-stopped
    networks:
      - cyber-shield
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "4G"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Database Backup ──────────────────────────────────────────────────
  backup:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.prod
    container_name: cyber-shield-backup
    command: python -m infra.scripts.backup_clickhouse
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - BACKUP_DIR=/backups
      - BACKUP_RETENTION_DAYS=30
    volumes:
      - backup_data:/backups
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cyber-shield
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "1G"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  cyber-shield:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  clickhouse_data:
    driver: local
  redis_data:
    driver: local
  ray_data:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local
  zeek_logs:
    driver: local
  suricata_logs:
    driver: local
  misp_data:
    driver: local
  backup_data:
    driver: local
  api_data:
    driver: local
  nginx_logs:
    driver: local

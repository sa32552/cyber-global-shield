# ⚛️ Cyber Global Shield — Quantum GitOps Deployment
# ArgoCD App of Apps — Un seul manifeste pour tout déployer
# Auto-sync, self-heal, rollback automatique, déploiement quantique

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cgs-quantum-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/cyber-global-shield/platform.git'
    path: Cyber Global Shield/infra/helm
    targetRevision: main
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: cgs-production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 5m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      jsonPointers:
        - /spec/metrics
---
# ──────────────────────────────────────────────────────────────────────────────
# Infrastructure Layer (Wave -5 to -1)
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cgs-clickhouse
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://charts.bitnami.com/bitnami'
    chart: clickhouse
    targetRevision: 6.*
    helm:
      values: |
        auth:
          username: cgs_user
          database: cyber_shield
        persistence:
          size: 100Gi
        resources:
          requests:
            cpu: "2000m"
            memory: "8Gi"
          limits:
            cpu: "8000m"
            memory: "32Gi"
        service:
          type: ClusterIP
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: cgs-production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
---

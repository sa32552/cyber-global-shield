apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cgs-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/cyber-global-shield/platform.git'
    path: Cyber Global Shield/infra/helm
    targetRevision: main
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: app.name
          value: cyber-global-shield
        - name: app.replicaCount
          value: '5'
        - name: app.image.tag
          value: 'latest'
        - name: global.environment
          value: production
        - name: app.resources.requests.cpu
          value: '1000m'
        - name: app.resources.requests.memory
          value: '1Gi'
        - name: app.resources.limits.cpu
          value: '4000m'
        - name: app.resources.limits.memory
          value: '4Gi'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: cgs-production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 5m

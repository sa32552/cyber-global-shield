global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: cyber-global-shield

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: "cyber-shield-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: api

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "clickhouse"
    static_configs:
      - targets: ["clickhouse:8000"]
        labels:
          service: clickhouse

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:9092"]
        labels:
          service: kafka

  - job_name: "vector"
    static_configs:
      - targets: ["vector:8686"]
        labels:
          service: vector

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: node

apiVersion: v1
kind: ConfigMap
metadata:
  name: cgs-config
  labels:
    {{- include "cgs.labels" . | nindent 4 }}
data:
  ENVIRONMENT: "{{ .Values.global.environment }}"
  LOG_LEVEL: "INFO"
  CORS_ORIGINS: "https://*.cyberglobalshield.io"
  ENABLE_HTTPS_REDIRECT: "true"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS_PER_MINUTE: "60"
  CLICKHOUSE_HOST: "{{ include "cgs.fullname" . }}-clickhouse"
  CLICKHOUSE_PORT: "8123"
  CLICKHOUSE_DATABASE: "cyber_shield"
  KAFKA_BOOTSTRAP_SERVERS: "{{ include "cgs.fullname" . }}-kafka:9092"
  REDIS_HOST: "{{ include "cgs.fullname" . }}-redis-master"
  REDIS_PORT: "6379"
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  PROMETHEUS_MULTIPROC_DIR: "/tmp"
  WEBSOCKET_HEARTBEAT_INTERVAL: "30"
  BACKUP_RETENTION_DAYS: "30"
  BACKUP_SCHEDULE: "0 */6 * * *"

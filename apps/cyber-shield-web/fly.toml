# fly.toml — Frontend Next.js (Cyber Global Shield Web)
# Généré automatiquement. Déploiement : fly deploy

app = "cyber-shield-web"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false  # Ne dort jamais
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

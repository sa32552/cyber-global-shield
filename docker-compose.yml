services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_incident_layer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_incident_layer
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai:8000
      API_PORT: 4000
    depends_on:
      - postgres
      - redis
      - ai
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env.example
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: http://localhost:4000
    depends_on:
      - api
    ports:
      - "3000:3000"

  ai:
    build:
      context: .
      dockerfile: apps/ai/Dockerfile
    env_file:
      - .env.example
    ports:
      - "8000:8000"

volumes:
  postgres_data: